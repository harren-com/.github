name: Reusable — Claude Code Review

on:
  workflow_call:
    inputs:
      runs-on:
        description: |
          Runner label. WICHTIG: für ARC scale-set runners IMMER den scale-set-Namen
          verwenden (org-weit 'shared-runners' seit der Org-Migration #234).
          'self-hosted' funktioniert NUR für klassische VM-basierte Self-Hosted-Runner —
          ARC scale-set runners haben dieses Label by design NICHT
          (actions/actions-runner-controller#3330).
        type: string
        required: true
      claude-args:
        description: 'Additional CLI arguments for claude-code (e.g. --model claude-sonnet-4-6)'
        type: string
        default: ''
      review-prompt:
        description: |
          Repo-spezifischer Review-Prompt (WAS reviewen: Stack, Fokuspunkte,
          Posting-Konvention). Wird der org-weiten Review-Protokoll-Preamble
          (siehe `review-protocol`) nachgestellt — der Caller muss Severity-Skala
          und State-Awareness NICHT selbst mitliefern, das erbt er zentral.
        type: string
        required: true
      review-protocol:
        description: |
          Org-weite Review-Protokoll-Preamble (Severity-Skala, erschöpfender erster
          Pass, state-aware Folge-Runden). Default ist die Standard-Preamble dieses
          Workflows — Single Source of Truth für alle Org-Repos. Nur überschreiben,
          wenn ein Repo bewusst ein abweichendes Protokoll braucht (Ausnahme).
        type: string
        required: false
        default: ''
      show-full-output:
        description: 'Show full Claude output for debugging (WARNING: may expose secrets in logs)'
        type: boolean
        default: false
      allowed-non-write-users:
        description: |
          Comma-separated list of GitHub usernames that bypass the write-permission check.
          Use to prevent 504-timeout failures on the GitHub collaborators API endpoint
          (observed on self-hosted K8s runners). Safe for owner-only repos.
          Default: 'HendrikHarren' (org owner, write access implied).
        type: string
        default: 'HendrikHarren'
      max-turns:
        description: |
          Maximale Anzahl agentischer Turns im Claude-Review-Loop (--max-turns-Flag).
          Default 25 ist eine Worst-Case-Bremse gegen endlose Loops — normale Reviews
          beenden sich deutlich früher (Runde 1 typisch 8–15 Turns).
          Zum Überschreiben: `max-turns: 40` im Caller-Workflow unter `with:`.
          Doppel-Flag-Semantik: dieser Wert wird an claude_args ANGEHÄNGT.
          Falls ein Caller bereits --max-turns in seinen claude-args setzt, gewinnt
          claude-code-action beim letzten Flag (last-wins) — d.h. der Caller-Wert
          überschreibt den Default. Bewusstes Überschreiben also via diesem Input
          ODER via claude-args möglich; letzterem hat Vorrang.
        type: number
        default: 25

jobs:
  claude-review:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 20

    steps:
      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install gh CLI to user-local bin if not available.
          # api.github.com gibt unauthenticated nur 60 calls/h pro IP — ARC scale-set pods
          # teilen Node-IP, daher häufig rate-limited bei vielen Workflow-Runs. Authenticated
          # mit GITHUB_TOKEN: 5000/h. Plus hardcoded Fallback wenn API doch failt.
          if ! command -v gh &>/dev/null; then
            GH_VERSION=$(curl -sL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              https://api.github.com/repos/cli/cli/releases/latest \
              | grep '"tag_name"' | head -1 | sed 's/.*"v\(.*\)".*/\1/')
            GH_VERSION=${GH_VERSION:-2.65.0}
            echo "Installing gh CLI v${GH_VERSION}"
            mkdir -p "$HOME/.local/bin"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" | tar xz -C /tmp
            cp "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" "$HOME/.local/bin/gh"
            chmod +x "$HOME/.local/bin/gh"
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean .claude/ symlinks (defensive — avoid ENOENT in action restore-step)
        # ARC scale-set runner pods can reuse the _work directory between jobs in the
        # same pod lifecycle. If a previous job left .claude/ symlinks pointing to absolute
        # paths from a developer machine (~/shared-claude-rules/...), the claude-code-action's
        # "Restoring .claude from origin/main (PR head is untrusted)" phase calls statx on the
        # symlink targets, fails with ENOENT, and exits before Claude even starts.
        # See HendrikHarren/ibkr_to_datev#573.
        run: |
          if [ -d .claude ]; then
            find .claude -type l -delete 2>/dev/null || true
          fi

      - name: Compose review prompt (protocol preamble + repo prompt)
        # Stellt dem repo-spezifischen Prompt die org-weite Review-Protokoll-Preamble
        # voran (Severity-Gating + erschöpfender erster Pass + state-aware Folge-Runden,
        # Issue #13). Single Source of Truth: ein Edit hier wirkt auf alle Org-Repos.
        # Schreibt das Resultat als Multiline-Env-Var FULL_PROMPT (heredoc-Delimiter,
        # damit beliebige Prompt-Inhalte ohne YAML-/Shell-Interpolation durchlaufen).
        env:
          REVIEW_PROTOCOL_INPUT: ${{ inputs.review-protocol }}
          REVIEW_PROMPT_INPUT: ${{ inputs.review-prompt }}
        run: |
          set -euo pipefail

          # Default-Protokoll als Datei schreiben. Bewusst KEIN $(cat <<EOF) — ein
          # single-quoted Heredoc INNERHALB einer Command-Substitution bricht bashs
          # Lexer an einem unbalancierten ASCII-" im Body (z. B. im Text „nice to have").
          # Direkt-in-Datei-Heredoc ist robust gegen beliebigen Body-Inhalt.
          cat > /tmp/default-protocol.md <<'PROTOCOL'
          # Review-Protokoll (org-weit, verbindlich)

          ## Severity-Skala — jedes Finding MUSS exakt eines dieser Labels als Präfix tragen
          - **[BLOCKER]** — Bug, Sicherheitslücke, Datenverlust: geht so nicht live. Blockt den Merge.
          - **[WARNING]** — messbare Regression oder konkretes Risiko: sollte gefixt werden. Blockt den Merge.
          - **[NIT]** — kosmetisch, Stil, "nice to have": blockt NICHT. Wird NICHT nachverfolgt
            (kein Follow-up-Issue). Trivial mitnehmen oder fallenlassen.

          ## Bestimme zuerst die Review-Runde
          Die PR-Nummer steht in `$GITHUB_REF` (Format `refs/pull/<N>/merge` → extrahiere `<N>`),
          das Repo in `$GITHUB_REPOSITORY` (`owner/repo`). Verlasse dich NICHT auf `gh pr view`
          ohne Argument — der Checkout ist ein Detached-HEAD-Merge-Ref ohne Branch.
          Lies damit deine eigenen, bereits auf diesem PR vorhandenen Review-Comments ein
          (`gh pr view "$N" --repo "$GITHUB_REPOSITORY" --comments` bzw.
          `gh api "repos/$GITHUB_REPOSITORY/pulls/$N/comments"`).
          Existiert KEIN früherer Review von dir, ist das **Runde 1**. Sonst **Folge-Runde**.

          ## Runde 1 — erschöpfender erster Pass
          - Reviewe den GESAMTEN PR-Diff vollständig in EINEM Durchgang.
          - Melde ALLE Findings aller Severitys SOFORT. Spare NICHTS für "später" auf —
            späte Runden dürfen keine Themen aufwerfen, die hier schon sichtbar waren.
          - Jedes Finding mit Severity-Label präfixen.

          ### PFLICHT: Completeness-Self-Check VOR dem Summary (Issue #19)
          Nach dem ersten Durchgang, aber BEVOR du das Summary abgibst, ist ein zweiter,
          erzwungener Audit-Pass obligatorisch. Bei großen Diffs verteilt sich die
          Aufmerksamkeit zu dünn, um "alles in einem Durchgang" zuverlässig zu finden —
          dieser zweite Pass schließt die Lücke und erzwingt Konvergenz in Runde 1.

          - **Selbst-Audit:** Gehe jede im Diff NEU hinzugefügte oder geänderte Funktion
            EINZELN durch und prüfe explizit auf:
            (a) Korrektheit der Logik,
            (b) Zähl-/Off-by-One-/Aggregations-Fehler,
            (c) unbehandelte Fehlerpfade / Edge-Cases.
            Liste pro Funktion kurz, was geprüft wurde.
          - Erst wenn dieser Audit-Pass abgeschlossen ist, gib das Summary ab.
          - **Größenabhängige Gründlichkeit:** Bei großen Diffs (Richtwert: > ~300
            geänderte Zeilen oder eine neue Datei > 200 Zeilen) hat dieser Audit-Pass
            besonders gründlich datei- und funktionsweise zu erfolgen — "alles in einem
            Durchgang finden" stößt bei diesem Umfang an Aufmerksamkeitsgrenzen, deshalb
            jede Datei und jede Funktion bewusst und getrennt durchgehen.

          ## Folge-Runden — state-aware Delta-Review
          - Prüfe NUR die Änderungen seit deinem letzten Review (neue Commits / neuer Diff),
            NICHT den ganzen PR erneut.
          - Verifiziere für jedes frühere Finding, ob es adressiert wurde, und sage das explizit
            ("[RESOLVED] ..." / "[STILL OPEN] ...").
          - Melde NEUE Findings NUR, wenn der Fix sie **eingeführt** hat (echte Regression im
            geänderten Code). Pre-existing Punkte, die in Runde 1 übersehen wurden, werden NICHT
            nachgereicht. Erlaubte Severity für fix-eingeführte Regressionen: [BLOCKER] oder
            [WARNING]. KEINE neuen [NIT] in Folge-Runden.

          ## Pflicht-Summary jede Runde
          Am Ende JEDER Runde MUSS ein nicht-leerer Summary als PR-Review-Body abgegeben werden.
          Format: "## Code-Review — Runde N" als Überschrift, gefolgt von einer Auflistung aller
          Findings mit ihrem Status. In Folge-Runden: "[RESOLVED] ..." bzw. "[STILL OPEN] ..."
          für jedes frühere Finding, danach neue Findings falls vorhanden. Letzter Satz entweder
          "Keine blockierenden Findings — merge-ready." oder eine klare Liste offener Blocker.
          Ein leerer Body ist unzulässig.

          ## PFLICHT: Maschinenlesbarer Verdikt-Marker am Ende des Summary (Issue #20)
          Am ALLERLETZTEN Ende deines Summary-Bodies MUSST du GENAU EINE Marker-Zeile
          ausgeben, exakt in diesem Format (HTML-Kommentar, im gerenderten Markdown
          unsichtbar):
              <!-- REVIEW_VERDICT: status=BLOCKED|CLEAN blockers=<n> warnings=<n> round=<n> -->
          Regeln:
          - `status=BLOCKED`, wenn IRGENDEIN offenes [BLOCKER] ODER [WARNING] verbleibt,
            sonst `status=CLEAN`.
          - `blockers=<n>` = Anzahl offener [BLOCKER], `warnings=<n>` = Anzahl offener
            [WARNING], `round=<n>` = aktuelle Review-Runde.
          - Genau EINE solche Zeile, exakt dieses Format — ein deterministischer
            Workflow-Step parst sie und setzt damit den Merge-Gate (roter/grüner Check).
            Fehlt der Marker oder ist er fehlformatiert, wertet der Gate konservativ als
            BLOCKED (roter Check). Gib ihn daher IMMER und korrekt aus.

          ### Persistenz des Runden-Verdikts (Issue #21)
          Das Runden-Verdikt wird vom WORKFLOW persistiert: Ein deterministischer Step
          schreibt nach jeder Runde einen editierten Sticky-Issue-Comment (stabiler
          Marker `<!-- claude-review-verdict-sticky -->`) mit Verdikt, Runde und Counts.
          Du musst dafür NUR den `REVIEW_VERDICT`-Marker oben korrekt ausgeben — den
          persistenten Audit-Comment baut und aktualisiert der Workflow selbst. Deine
          Inline-Comments bleiben rein zeilengenaue "fix-this-here"-Hinweise; sie werden
          pro Runde reconciled (gelöscht/neu) und sind NICHT die Audit-Quelle.

          ## Finale Pflicht-Aktion nach dem Summary — APPROVE oder CHANGES_REQUESTED
          Nach dem Summary MUSS der Reviewer genau EINEN gh-Review-Submit ausführen, damit
          GitHubs `reviewDecision` korrekt gesetzt ist:
          - Offene [BLOCKER] oder [WARNING] vorhanden →
              gh pr review "$N" --repo "$GITHUB_REPOSITORY" --request-changes --body "<dein Summary>"
          - Keine offenen [BLOCKER]/[WARNING] →
              gh pr review "$N" --repo "$GITHUB_REPOSITORY" --approve --body "<dein Summary>"
          `$N` und `$GITHUB_REPOSITORY` sind aus dem Schritt "Bestimme die Review-Runde" bereits
          bekannt. `GH_TOKEN` und `gh` sind in der Action-Step-Umgebung verfügbar.
          github-actions[bot] darf approven — er ist nicht PR-Author, die Permission ist gegeben.
          Dieser Submit ist kosmetisch für GitHubs `reviewDecision`; der VERLÄSSLICHE
          Merge-Gate ist der deterministische Workflow-Step, der den Verdikt-Marker parst.
          Lass den Submit dennoch nicht weg.

          ## Konvergenz
          Bleiben keine offenen [BLOCKER]/[WARNING] mehr, sage das klar im Summary
          ("Keine blockierenden Findings — merge-ready") und reiche ein APPROVE ein,
          damit die Fix-Loop terminiert und der Merge-Gate freigibt.
          PROTOCOL

          # Caller-Override hat Vorrang, sonst Default aus der Datei.
          if [ -n "$REVIEW_PROTOCOL_INPUT" ]; then
            printf '%s\n' "$REVIEW_PROTOCOL_INPUT" > /tmp/protocol.md
          else
            cp /tmp/default-protocol.md /tmp/protocol.md
          fi

          {
            echo "FULL_PROMPT<<__CLAUDE_PROMPT_EOF__"
            cat /tmp/protocol.md
            echo ""
            echo "---"
            echo ""
            printf '%s\n' "$REVIEW_PROMPT_INPUT"
            echo "__CLAUDE_PROMPT_EOF__"
          } >> "$GITHUB_ENV"

      - name: Reconcile stale bot inline comments
        # Inline-Comment-Reconciliation (Issue #15):
        # Das state-aware Review-Protokoll dedupliziert nur den Prosa-Sticky-Summary
        # über die Runden (siehe "Compose review prompt"-Step oben), NICHT die
        # zeilengenauen Inline-Review-Comments. Jeder Run postet frische
        # Inline-Comments; die alten werden nie aufgelöst/gelöscht — GitHub klappt
        # einen Inline-Comment nur dann als "outdated" ein, wenn sich exakt seine
        # Zeile ändert. Findings, die an anderer Stelle behoben wurden, bleiben
        # sichtbar. Resultat: die Inline-Ebene ("fix this") divergiert von der
        # Sticky-Summary ("merge-ready"), der Review wirkt zerfasert/kaputt.
        #
        # Fix: VOR dem Action-Lauf die bestehenden github-actions[bot]-INLINE-
        # Comments des PR löschen, damit die Inline-Ebene jede Runde frisch
        # aufgebaut wird und konsistent zur Sticky-Summary bleibt. Nur Bot-Inline-
        # Comments werden entfernt; User-Comments und der persistente
        # Sticky-Issue-Comment (Single-Source-of-Truth des kumulativen State,
        # den die Folge-Runden ohnehin als Quelle nutzen) bleiben unangetastet.
        # gh ist bereits aus dem "Install dependencies"-Step auf dem PATH.
        #
        # Belt-and-Suspenders (Issue #21): Dieser Reconcile betrifft ausschließlich
        # INLINE-Comments (`pulls/$N/comments`) — der persistente Verdikt-Sticky ist
        # ein ISSUE-Comment (`issues/$N/comments`) und damit ohnehin nicht betroffen.
        # Dennoch filtern wir den Sticky-Marker `<!-- claude-review-verdict-sticky -->`
        # explizit aus der Löschmenge heraus, damit ein bewusst persistenter
        # Verdikt-Kommentar NIE versehentlich erfasst wird (Audit-Trail-Schutz).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # PR-Nr aus $GITHUB_REF (refs/pull/<N>/merge), Repo aus $GITHUB_REPOSITORY.
          PR="${GITHUB_REF#refs/pull/}"
          PR="${PR%/merge}"
          if ! [[ "$PR" =~ ^[0-9]+$ ]]; then
            echo "Keine PR-Nr aus GITHUB_REF=$GITHUB_REF ableitbar — überspringe."
            exit 0
          fi
          echo "Reconcile: lösche stale github-actions[bot]-Inline-Comments auf PR #$PR ..."
          # PR-Review-Comments paginiert holen und Bot-IDs sammeln. Fehlertolerant:
          # bei API-Hiccup leeres Ergebnis statt Job-Fail.
          # Marker-basierter Schutz (Issue #21): Comments, die den Verdikt-Sticky-Marker
          # tragen, werden NIE gelöscht — der Audit-Trail bleibt erhalten.
          ids="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("claude-review-verdict-sticky") | not) | .id' \
            2>/dev/null || true)"
          if [ -z "$ids" ]; then
            echo "Keine Bot-Inline-Comments zu entfernen."
            exit 0
          fi
          for id in $ids; do
            echo "Lösche Inline-Comment $id"
            gh api -X DELETE \
              "repos/${GITHUB_REPOSITORY}/pulls/comments/${id}" \
              >/dev/null 2>&1 || true
          done
          echo "Inline-Comment-Reconciliation abgeschlossen."

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        env:
          # claude-code-action v2.1+ installiert bubblewrap (bwrap) für Subprocess-Isolation
          # und versucht AppArmor-Restriction via sysctl zu deaktivieren. Im ARC-K8s-Runner
          # ist /proc/sys/ read-only → sysctl schlägt fehl → bwrap kann keine User-Namespaces
          # erstellen → alle Bash-Subprozesse (inkl. `gh pr comment`) schlagen fehl.
          # Fix: Subprocess-Scrubbing deaktivieren (offizieller Opt-out). Claude läuft dann
          # ohne bwrap-Sandbox direkt im Runner-Prozess — akzeptabel, da der ARC-Pod selbst
          # bereits eine isolierte Sandbox ist (ephemeral, kein Zugriff auf Host).
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: '0'
          # gh-Auth für den Reviewer: das state-aware Folge-Runden-Protokoll (Issue #13) ruft
          # `gh pr view`/`gh api` auf, um eigene frühere Review-Comments zu lesen. Mit
          # SUBPROCESS_ENV_SCRUB=0 erbt der Bash-Tool-Subprozess diese Env, sodass gh
          # authentifiziert ist (sonst scheitert der Call still → Folge-Runde degradiert zu Runde 1).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ env.FULL_PROMPT }}
          # --max-turns wird ANGEHÄNGT → last-wins-Semantik (claude-code-action).
          # Der Default-Wert (25) steht hinten und gewinnt daher gegen einen Caller,
          # der --max-turns in claude-args setzt. Bewusstes Erhöhen: Input `max-turns`
          # überschreiben (z.B. max-turns: 40) — dieser Input ersetzt dann den Default.
          claude_args: ${{ inputs.claude-args }} --max-turns ${{ inputs.max-turns }}
          show_full_output: ${{ inputs.show-full-output }}
          # Bypass flaky GitHub API permission-check (504 timeout from self-hosted K8s runner).
          # Owner-repos only — safe as long as this workflow is org-internal.
          allowed_non_write_users: ${{ inputs.allowed-non-write-users }}

      - name: Persist round verdict (sticky issue comment, audit trail)
        # Persistenter Verdikt-Sticky (Issue #21):
        # Das Runden-Verdikt darf NICHT als löschbarer Inline-Comment/Review-Body
        # leben — der Reconcile-Step räumt Inline-Bot-Comments jede Runde weg, womit
        # das Verdikt einer ≥3.-Runde verschwand (kein Audit-Trail mehr).
        # Dieser Step upsertet stattdessen einen persistenten ISSUE-Comment (NICHT
        # Inline) mit stabilem Marker `<!-- claude-review-verdict-sticky -->`:
        # existiert er bereits -> PATCH (Body in-place updaten), sonst neu anlegen.
        # Quelle ist derselbe REVIEW_VERDICT-Marker, den die Action vom Modell erzwingt.
        # Dieser Comment ist die persistente Audit-Quelle und überlebt jeden Reconcile
        # (der Reconcile filtert den Marker explizit aus, s. o.).
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          PR="${GITHUB_REF#refs/pull/}"
          PR="${PR%/merge}"
          REPO="${GITHUB_REPOSITORY}"
          if ! [[ "$PR" =~ ^[0-9]+$ ]]; then
            echo "Keine PR-Nr aus GITHUB_REF=$GITHUB_REF ableitbar — überspringe Sticky."
            exit 0
          fi

          # Jüngsten REVIEW_VERDICT-Marker aus Bot-Review-Bodies + Issue-Comments ziehen
          # (identische Quelle wie der Gate-Step). Den Sticky selbst ausschließen, damit
          # wir nicht unseren eigenen, evtl. veralteten Marker erneut konservieren.
          : > /tmp/sticky-bodies.txt
          gh api --paginate "repos/${REPO}/pulls/${PR}/reviews" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | "\(.submitted_at // .created_at // "")\t\(.body // "" | gsub("\r";"") | gsub("\n";"\\n"))"' \
            >> /tmp/sticky-bodies.txt 2>/dev/null || true
          gh api --paginate "repos/${REPO}/issues/${PR}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("claude-review-verdict-sticky") | not) | "\(.created_at // "")\t\(.body // "" | gsub("\r";"") | gsub("\n";"\\n"))"' \
            >> /tmp/sticky-bodies.txt 2>/dev/null || true

          MARKER_LINE="$(sort /tmp/sticky-bodies.txt \
            | grep -o '<!-- REVIEW_VERDICT:[^>]*-->' \
            | tail -1 || true)"

          if [ -z "$MARKER_LINE" ]; then
            STATUS="UNBEKANNT"; BLOCKERS="?"; WARNINGS="?"; ROUND="?"
            echo "Kein REVIEW_VERDICT-Marker gefunden — Sticky mit UNBEKANNT schreiben."
          else
            STATUS="$(echo "$MARKER_LINE"   | sed -n 's/.*status=\([A-Za-z]*\).*/\1/p')"
            BLOCKERS="$(echo "$MARKER_LINE" | sed -n 's/.*blockers=\([0-9]*\).*/\1/p')"
            WARNINGS="$(echo "$MARKER_LINE" | sed -n 's/.*warnings=\([0-9]*\).*/\1/p')"
            ROUND="$(echo "$MARKER_LINE"    | sed -n 's/.*round=\([0-9]*\).*/\1/p')"
            STATUS="${STATUS:-UNBEKANNT}"; BLOCKERS="${BLOCKERS:-?}"
            WARNINGS="${WARNINGS:-?}"; ROUND="${ROUND:-?}"
          fi

          NOW="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # Sticky-Body direkt in Datei schreiben (kein $(cat <<EOF) — bricht bashs
          # Lexer an unbalanciertem ASCII-"). Marker als allererste Zeile.
          cat > /tmp/sticky-body.md <<STICKY
          <!-- claude-review-verdict-sticky -->
          ## Claude-Review — Verdikt (persistenter Audit-Trail)

          | Feld | Wert |
          |---|---|
          | Verdikt | \`${STATUS}\` |
          | Offene BLOCKER | ${BLOCKERS} |
          | Offene WARNINGS | ${WARNINGS} |
          | Runde | ${ROUND} |
          | Aktualisiert (UTC) | ${NOW} |

          _Dieser Kommentar wird vom Review-Workflow nach jeder Runde edit-in-place aktualisiert (Issue #21). Inline-Comments bleiben zeilengenaue Hinweise und werden pro Runde reconciled._
          STICKY

          # Existierenden Sticky finden (Marker im Body), sonst neu anlegen.
          EXISTING_ID="$(gh api --paginate "repos/${REPO}/issues/${PR}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("claude-review-verdict-sticky")) | .id' \
            2>/dev/null | head -1 || true)"

          if [ -n "$EXISTING_ID" ]; then
            echo "Aktualisiere Verdikt-Sticky (Comment $EXISTING_ID) ..."
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -F body=@/tmp/sticky-body.md >/dev/null 2>&1 \
              && echo "Sticky aktualisiert." \
              || echo "WARN: Sticky-PATCH fehlgeschlagen (non-fatal)."
          else
            echo "Lege neuen Verdikt-Sticky an ..."
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" \
              -F body=@/tmp/sticky-body.md >/dev/null 2>&1 \
              && echo "Sticky angelegt." \
              || echo "WARN: Sticky-POST fehlgeschlagen (non-fatal)."
          fi

      - name: Deterministic merge gate (parse REVIEW_VERDICT marker)
        # Deterministischer Merge-Gate (Issue #20):
        # Der Gate wird NICHT dem Modell überlassen — das war nicht-deterministisch
        # (führte das Modell `gh pr review` nicht aus oder failte der Call still,
        # blieb der Check grün und der Merge lief über offene WARNINGs durch).
        # Stattdessen parst DIESER Step den maschinenlesbaren Verdikt-Marker, den die
        # Protokoll-Preamble vom Modell erzwingt:
        #   <!-- REVIEW_VERDICT: status=BLOCKED|CLEAN blockers=<n> warnings=<n> round=<n> -->
        # Quelle ist der jüngste github-actions[bot]-Review-Body bzw. Issue-Comment.
        #
        # Da dieser Step im SELBEN Job NACH der Action läuft, macht ein `exit 1` die
        # Job-Conclusion (= der `claude-review`-Check) rot. Das ist der verlässliche,
        # deterministische Pre-Merge-Indikator. Fail-safe: kein/ungültiger Marker =>
        # konservativ BLOCKED (roter Check), zwingt Aufmerksamkeit.
        #
        # DESCOPE (Free-Tier): Hard-Enforcement (Merge über offene WARNINGs ohne Admin
        # unmöglich) braucht Branch-Protection/Required-Checks — auf privaten Repos nur
        # mit Team-Plan, den die Org bewusst NICHT hat. Dieser rote Check liefert die
        # Pre-Merge-Sichtbarkeit; die Hard-Enforcement-Lücke ist POST-HOC durch
        # review-gate-alert.yml (cloud-dev-environment #283) abgedeckt (Alert-Issue bei
        # Merge ohne grünen Review).
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # PR-Nr aus $GITHUB_REF (refs/pull/<N>/merge), Repo aus $GITHUB_REPOSITORY.
          PR="${GITHUB_REF#refs/pull/}"
          PR="${PR%/merge}"
          REPO="${GITHUB_REPOSITORY}"
          if ! [[ "$PR" =~ ^[0-9]+$ ]]; then
            echo "Keine PR-Nr aus GITHUB_REF=$GITHUB_REF ableitbar — Gate kann nicht greifen."
            echo "::error::Merge-Gate: keine PR-Nummer ableitbar."
            {
              echo "## Claude-Review Merge-Gate"
              echo ""
              echo "**Ergebnis:** FEHLER — keine PR-Nummer aus \`$GITHUB_REF\` ableitbar."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Alle Kandidaten-Bodies (Review-Bodies + Issue-Comments) des Bots sammeln und
          # die jüngste gültige REVIEW_VERDICT-Marker-Zeile herausziehen. Beide Quellen
          # paginiert, damit auch ältere Runden erfasst sind; sortiert nach created_at.
          : > /tmp/gate-bodies.txt
          gh api --paginate "repos/${REPO}/pulls/${PR}/reviews" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | "\(.submitted_at // .created_at // "")\t\(.body // "" | gsub("\r";"") | gsub("\n";"\\n"))"' \
            >> /tmp/gate-bodies.txt 2>/dev/null || true
          gh api --paginate "repos/${REPO}/issues/${PR}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | "\(.created_at // "")\t\(.body // "" | gsub("\r";"") | gsub("\n";"\\n"))"' \
            >> /tmp/gate-bodies.txt 2>/dev/null || true

          # Nach Zeitstempel sortieren (jüngste zuletzt), Zeilen mit Marker filtern,
          # letzte (= jüngste) nehmen. Der Body ist pro Zeile mit \n maskiert, der
          # Marker steht damit auf derselben Zeile wie sein Body.
          MARKER_LINE="$(sort /tmp/gate-bodies.txt \
            | grep -o '<!-- REVIEW_VERDICT:[^>]*-->' \
            | tail -1 || true)"

          if [ -z "$MARKER_LINE" ]; then
            echo "Kein gültiger REVIEW_VERDICT-Marker gefunden — konservativ BLOCKED."
            {
              echo "## Claude-Review Merge-Gate"
              echo ""
              echo "**Verdikt:** BLOCKED (fail-safe)"
              echo ""
              echo "Kein \`REVIEW_VERDICT\`-Marker im jüngsten Bot-Review/-Comment gefunden."
              echo "Der Gate wertet das konservativ als blockierend (roter Check)."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Merge-Gate BLOCKED — kein gültiger REVIEW_VERDICT-Marker gefunden."
            exit 1
          fi

          echo "Gefundener Marker: $MARKER_LINE"
          STATUS="$(echo "$MARKER_LINE"   | sed -n 's/.*status=\([A-Za-z]*\).*/\1/p')"
          BLOCKERS="$(echo "$MARKER_LINE" | sed -n 's/.*blockers=\([0-9]*\).*/\1/p')"
          WARNINGS="$(echo "$MARKER_LINE" | sed -n 's/.*warnings=\([0-9]*\).*/\1/p')"
          ROUND="$(echo "$MARKER_LINE"    | sed -n 's/.*round=\([0-9]*\).*/\1/p')"
          BLOCKERS="${BLOCKERS:-?}"
          WARNINGS="${WARNINGS:-?}"
          ROUND="${ROUND:-?}"

          {
            echo "## Claude-Review Merge-Gate"
            echo ""
            echo "| Feld | Wert |"
            echo "|---|---|"
            echo "| Verdikt | \`${STATUS:-UNBEKANNT}\` |"
            echo "| Offene BLOCKER | ${BLOCKERS} |"
            echo "| Offene WARNINGS | ${WARNINGS} |"
            echo "| Runde | ${ROUND} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$STATUS" = "CLEAN" ]; then
            echo "Merge-Gate: CLEAN — keine offenen BLOCKER/WARNING. Check grün."
            exit 0
          fi
          # Alles außer eindeutig CLEAN (inkl. BLOCKED, leer, unerwartet) => rot.
          echo "::error::Merge-Gate BLOCKED — Verdikt=${STATUS:-UNBEKANNT}, blockers=${BLOCKERS}, warnings=${WARNINGS}."
          exit 1
